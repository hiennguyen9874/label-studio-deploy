version: "3.9"

services:
  nginx:
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    ports:
      - "${PORT}:8085"
      # - "8081:8086"
    depends_on:
      - app
    environment:
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST}
    volumes:
      - ${DATA_PATH}/data:/label-studio/data:rw
    command: nginx

  app:
    stdin_open: true
    tty: true
    image: heartexlabs/label-studio:latest
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      - db
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=postgres
      - POSTGRE_USER=postgres
      - POSTGRE_PASSWORD=
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=db
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST}
      - JSON_LOG=1
      - EXPERIMENTAL_FEATURES=True
      - LABEL_STUDIO_CSRF_TRUSTED_ORIGINS=${LABEL_STUDIO_HOST}
      - USE_ENFORCE_CSRF_CHECKS=0
      - LOG_LEVEL=INFO
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/external-data
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      - LABEL_STUDIO_USERNAME=${LABEL_STUDIO_USERNAME}
      - LABEL_STUDIO_PASSWORD=${LABEL_STUDIO_PASSWORD}
    volumes:
      - ${DATA_PATH}/data:/label-studio/data:rw
      - ${DATA_PATH}/external-data:/external-data
    command: label-studio-uwsgi

  db:
    image: pgautoupgrade/pgautoupgrade:17-alpine
    hostname: db
    restart: unless-stopped
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
      - POSTGRES_USER=postgres
    volumes:
      - ${DATA_PATH}/postgresql-data:/var/lib/postgresql/data
